name: T00ls 签到

on:
  schedule:
    # 每天 UTC 0:00 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，用于更新仓库活跃状态
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run checkin
        env:
          T00LS_USERNAME: ${{ secrets.T00LS_USERNAME }}
          T00LS_PASSWORD: ${{ secrets.T00LS_PASSWORD }}
          T00LS_QUESTIONID: ${{ secrets.T00LS_QUESTIONID }}
          T00LS_ANSWER: ${{ secrets.T00LS_ANSWER }}
          T00LS_ACCESS_TOKEN: ${{ secrets.DD_ACCESS_TOKEN }} # 注意：这里保持你原有的 Secret 名称
          T00LS_SECRET: ${{ secrets.DD_SECRET }}
        run: python toolsqiandao.py

      # 新增：自动保活步骤
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v1
        with:
          use_api: true
